<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yeni Müəllif Əlavə Et</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
<div class="max-w-lg mx-auto mt-12 bg-white p-8 shadow-lg rounded-lg">
    <h1 class="text-2xl font-bold mb-6 text-gray-800 text-center">✍️ Yeni Müəllif Əlavə Et</h1>

    <form th:action="@{/authors/add}" th:object="${author}" method="post" class="space-y-4">
        <div>
            <label class="block text-gray-700 mb-1">Ad</label>
            <input type="text" th:field="*{name}"
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring focus:ring-blue-300" required>
        </div>

        <div>
            <label class="block text-gray-700 mb-1">Email</label>
            <input type="email" th:field="*{email}"
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring focus:ring-blue-300" required>
        </div>

        <div>
            <label class="block text-gray-700 mb-1">Doğum ili</label>
            <input type="text" th:field="*{birthYear}"
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring focus:ring-blue-300">
        </div>

        <div class="flex justify-between mt-6">
            <a href="/authors" class="text-gray-600 hover:underline">⬅ Geri</a>
            <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg transition">
                Əlavə et
            </button>
        </div>
    </form>
</div>
</body>
</html>
