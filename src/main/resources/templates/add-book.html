<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookworm.az - Yeni Kitab Əlavə Et</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- Header fragment (YENİ SYNTAX) -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- Content -->
<div class="max-w-2xl mx-auto mt-8 p-6 bg-white rounded-xl shadow-lg">

    <!-- Başlıq -->
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">➕ Yeni Kitab Əlavə Et</h1>
            <p class="text-gray-600 mt-1">Kitab məlumatlarını doldurun</p>
        </div>
        <a th:href="@{/books}" class="px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-lg transition">
            ← Kitablar
        </a>
    </div>

    <!-- Form -->
    <form th:action="@{/books/add}" th:object="${book}" method="post" class="space-y-6">

        <!-- Kitab adı -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">📖 Kitab adı</label>
            <input type="text" th:field="*{title}"
                   class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                   placeholder="Kitabın adını yazın" required />
        </div>

        <!-- İl -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">📅 Nəşr ili</label>
            <input type="number" th:field="*{year}" min="1800" max="2025"
                   class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                   placeholder="Nəşr ili" />
        </div>

        <!-- Müəllif -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-3">✍️ Müəllif</label>

            <!-- Mövcud müəlliflər -->
            <div class="mb-4 p-4 bg-blue-50 border border-blue-200 rounded-lg">
                <label class="block text-sm font-medium text-blue-800 mb-2">Mövcud müəllif</label>
                <select th:field="*{authorId}" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500">
                    <option value="">Müəllif seçin...</option>
                    <option th:each="author : ${authors}" th:value="${author.id}" th:text="${author.name}"></option>
                </select>
            </div>

            <!-- Yeni müəllif -->
            <div class="p-4 bg-green-50 border border-green-200 rounded-lg">
                <label class="block text-sm font-medium text-green-800 mb-2">Yeni müəllif</label>
                <input type="text" th:field="*{newAuthorName}"
                       class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 focus:border-green-500"
                       placeholder="Yeni müəllif adını yazın" />
            </div>
        </div>

        <!-- Janrlar -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-3">🎭 Janrlar (Ctrl + click)</label>
            <select multiple th:field="*{genreIds}" size="8" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-purple-500 h-48">
                <option th:each="genre : ${genres}" th:value="${genre.id}" th:text="${genre.name}"></option>
            </select>
        </div>

        <!-- Düymələr -->
        <div class="flex gap-4 pt-6 border-t border-gray-200">
            <button type="submit" class="flex-1 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition">
                💾 Kitabı Saxla
            </button>
            <a th:href="@{/books}" class="px-6 py-3 bg-gray-500 hover:bg-gray-600 text-white font-semibold rounded-lg transition">
                ❌ Ləğv Et
            </a>
        </div>
    </form>
</div>

</body>
</html>
