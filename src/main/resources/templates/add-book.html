<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>📘 Yeni Kitab Əlavə Et</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- Header -->
<div th:replace="fragments/header :: header"></div>

<!-- Content -->
<div class="max-w-3xl mx-auto mt-8 p-6 bg-white rounded-xl shadow-lg">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">📚 Yeni Kitab Əlavə Et</h1>

    <form th:action="@{/books/add}" th:object="${book}" method="post" class="space-y-6">

        <label class="block mb-1 font-medium text-gray-700">Kitabın Adı</label>
        <input type="text" th:field="*{title}" placeholder="Kitabın adı" class="w-full border rounded-lg px-3 py-2"/>

        <label class="block mb-1 font-medium text-gray-700">Nəşr ili</label>
        <input type="number" th:field="*{year}" placeholder="YYYY" class="w-full border rounded-lg px-3 py-2"/>

        <label class="block mb-1 font-medium text-gray-700">Müəllifin Adı</label>
        <input type="text" th:field="*{author.name}" placeholder="Müəllifin adı" class="w-full border rounded-lg px-3 py-2"/>

        <select name="genreId" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
            <option value="">-- Janr seçin --</option>
            <option th:each="g : ${genres}" th:value="${g.id}" th:text="${g.name}"></option>
        </select>



        <button type="submit"
                class="mt-4 px-6 py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition">
            Əlavə Et
        </button>
    </form>


    <!-- Geri link -->
    <div class="mt-4">
        <a th:href="@{/books}" class="text-blue-600 hover:underline">← Kitablar Siyahısına Qayıt</a>
    </div>
</div>

</body>
</html>
