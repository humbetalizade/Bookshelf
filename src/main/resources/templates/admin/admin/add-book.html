<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Yeni Kitab | Bookworm</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<div th:replace="~{fragments/header :: header}"></div>

<div class="max-w-2xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
    <div class="bg-white rounded-2xl shadow-2xl p-8">
        <div class="flex items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">➕ Yeni Kitab Əlavə Et</h1>
            <a th:href="@{/admin/books}" class="ml-auto bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-xl font-semibold">← Geri</a>
        </div>

        <form th:action="@{/admin/add}" th:object="${book}" method="post" class="space-y-6">
            <!-- Kitab Adı -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">📖 Kitab Adı *</label>
                <input type="text" th:field="*{title}" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                       placeholder="Harry Potter və Fəlsəfə Daşı">
            </div>

            <!-- Nəşr İli -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">📅 Nəşr İli *</label>
                <input type="number" th:field="*{publishYear}" required min="1800" max="2025"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <!-- Müəllif -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">✍️ Müəllif *</label>
                <select th:field="*{authorId}" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
                    <option value="">Müəllif seçin...</option>
                    <option th:each="author : ${authors}"
                            th:value="${author.id}" th:text="${author.name}"></option>
                </select>
            </div>

            <!-- Janrlar -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">🎭 Janrlar (Ctrl+Click ilə çoxlu)</label>
                <select th:field="*{genreIds}" multiple class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 h-32">
                    <option th:each="genre : ${genres}"
                            th:value="${genre.id}" th:text="${genre.name}"></option>
                </select>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit"
                        class="flex-1 bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white py-4 px-6 rounded-xl font-bold text-lg shadow-xl transition-all">
                    💾 Kitabı Saxla
                </button>
                <a th:href="@{/admin/books}"
                   class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-4 px-6 rounded-xl font-bold text-lg text-center shadow-xl transition-all">
                    ← Ləğv Et
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
