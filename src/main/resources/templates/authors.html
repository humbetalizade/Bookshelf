<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookworm.az - Müəlliflər</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- Header fragment -->
<div th:replace="fragments/header :: header"></div>

<!-- Content -->
<div class="max-w-6xl mx-auto mt-8 p-6 bg-white rounded-xl shadow-lg">

    <h1 class="text-2xl font-bold mb-6 text-gray-800">📚 Müəlliflər</h1>
    <!-- Əgər müəllif yoxdursa -->
    <div th:if="${#lists.isEmpty(authors)}" class="text-gray-500">
        Hələ heç bir müəllif əlavə edilməyib ✍️
    </div>

    <!-- Cədvəl -->
    <div th:if="${!#lists.isEmpty(authors)}" class="overflow-x-auto">
        <table class="w-full table-auto border-collapse">
            <thead>
            <tr class="bg-gray-200 text-gray-700">
                <th class="px-4 py-2 text-left">Ad</th>
                <th class="px-4 py-2 text-center">Əməliyyatlar</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="author : ${authors}" class="border-b hover:bg-gray-50 transition">
                <td class="px-4 py-2 font-semibold text-gray-800" th:text="${author.name}"></td>
                <td class="px-4 py-2 text-center space-x-3">
                    <a th:href="@{/authors/edit/{id}(id=${author.id})}" class="text-blue-600 hover:underline">Redaktə</a>
                    <a th:href="@{/authors/delete/{id}(id=${author.id})}" class="text-red-600 hover:underline">Sil</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
