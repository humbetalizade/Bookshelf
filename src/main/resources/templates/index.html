<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookworm.az - Kitablar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- Header fragment -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- Content -->
<div class="max-w-6xl mx-auto mt-8 p-6 bg-white rounded-xl shadow-lg">

    <!-- Başlıq və əlavə et düyməsi -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">📚 Kitab Siyahısı</h1>
        <a th:href="@{/books/add}" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition">
            + Yeni Kitab
        </a>
    </div>




    <!-- Əgər kitab yoxdur -->
    <div th:if="${message != null}" class="text-gray-600 mb-4">
        <p th:text="${message}"></p>
    </div>

    <!-- Kitab cədvəli -->
    <div th:if="${books != null and !#lists.isEmpty(books)}" class="overflow-x-auto">
        <table class="w-full table-auto border-collapse">
            <thead>
            <tr class="bg-gray-200 text-gray-700">
                <th class="px-4 py-2 text-left">Başlıq</th>
                <th class="px-4 py-2 text-left">Müəllif</th>
                <th class="px-4 py-2 text-left">Janrlar</th>
                <th class="px-4 py-2 text-left">İl</th>
                <th class="px-4 py-2 text-center">Əməliyyatlar</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}" class="border-b hover:bg-gray-50 transition">
                <td class="px-4 py-2 font-semibold text-gray-800" th:text="${book.title}"></td>
                <td class="px-4 py-2 text-gray-700" th:text="${book.author != null ? book.author.name : '—'}"></td>
                <td class="px-4 py-2 text-gray-700">
                    <span th:each="g : ${book.genres}" th:text="${g}" th:append="${!#lists.isLast(g, book.genres)} ? ', ' : ''"></span>
                </td>
                <td class="px-4 py-2 text-gray-700" th:text="${book.year}"></td>
                <td class="px-4 py-2 text-center space-x-3">
                    <a th:href="@{'/books/edit/' + ${book.id}}" class="text-blue-600 hover:underline">Redaktə</a>
                    <a th:href="@{'/books/delete/' + ${book.id}}" class="text-red-600 hover:underline">Sil</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
