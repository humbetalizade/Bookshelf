<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bookshelf</title>
</head>
<body>
<h1>Bookshelf</h1>

<a href="/books/add">Add new book</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Year</th>
        <th>Actions</th>
    </tr>
    <tr th:each="book : ${books}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.year}"></td>
        <td>
            <a th:href="@{'/books/edit/' + ${book.id}}">Redaktə Et</a> |
            <a th:href="@{'/books/delete/' + ${book.id}}">Sil</a>
        </td>
    </tr>
</table>

</body>
</html>
